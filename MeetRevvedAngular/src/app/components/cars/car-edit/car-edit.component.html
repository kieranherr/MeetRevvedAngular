<div class="page-wrapper">
  <div *ngIf="loading" class="state-message">Loading car...</div>
  <div *ngIf="error && !loading" class="state-message error">{{ error }}</div>

  <div class="card" *ngIf="!loading && carForm">
    <h2 class="card-title">✏️ Modify Your Car</h2>
    <hr />

    <div *ngIf="error" class="alert-error">{{ error }}</div>

    <form [formGroup]="carForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="vin">VIN</label>
        <input id="vin" formControlName="vin" class="form-control" />
        <span class="field-error" *ngIf="carForm.get('vin')?.invalid && carForm.get('vin')?.touched">VIN is required.</span>
      </div>

      <div class="form-group">
        <label for="make">Make</label>
        <input id="make" formControlName="make" class="form-control" />
        <span class="field-error" *ngIf="carForm.get('make')?.invalid && carForm.get('make')?.touched">Make is required.</span>
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input id="model" formControlName="model" class="form-control" />
        <span class="field-error" *ngIf="carForm.get('model')?.invalid && carForm.get('model')?.touched">Model is required.</span>
      </div>

      <div class="form-group">
        <label for="year">Year</label>
        <input id="year" type="number" formControlName="year" class="form-control" />
        <span class="field-error" *ngIf="carForm.get('year')?.invalid && carForm.get('year')?.touched">A valid year is required.</span>
      </div>

      <div class="form-group">
        <label for="mileage">Mileage</label>
        <input id="mileage" type="number" formControlName="mileage" class="form-control" />
        <span class="field-error" *ngIf="carForm.get('mileage')?.invalid && carForm.get('mileage')?.touched">Mileage is required.</span>
      </div>

      <div class="form-group">
        <label for="mods">Mods</label>
        <input id="mods" formControlName="mods" class="form-control" />
      </div>

      <div class="form-group">
        <label for="imageLocation">Image URL</label>
        <input id="imageLocation" formControlName="imageLocation" class="form-control" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="submitting">
          {{ submitting ? 'Saving...' : 'Save Changes' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="goBack()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<style>
  .page-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 3rem 1rem;
    background: #1a1a2e;
  }
  .card {
    background: #16213e;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    color: #eee;
  }
  .card-title { font-size: 1.75rem; margin-bottom: 0.5rem; }
  hr { border-color: #334; margin-bottom: 1.5rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1.1rem; }
  label { font-size: 0.9rem; color: #aaa; font-weight: 500; }
  .form-control {
    background: #0f3460;
    border: 1px solid #334;
    border-radius: 8px;
    color: #fff;
    padding: 0.55rem 0.9rem;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-control:focus { border-color: #e94560; }
  .field-error { color: #e94560; font-size: 0.8rem; }
  .alert-error { background: rgba(233,69,96,0.15); color: #e94560; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; }
  .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn { padding: 0.55rem 1.4rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-secondary { background: #0f3460; color: #fff; }
  .btn:hover:not(:disabled) { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .state-message { text-align: center; padding: 3rem; color: #aaa; }
  .state-message.error { color: #e94560; }
</style>
