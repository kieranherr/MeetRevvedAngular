<div class="page-wrapper">
  <div class="card">
    <h2 class="card-title">👥 Friends</h2>
    <hr />
    <div *ngIf="loading" class="loading-text">Loading friends...</div>
    <div *ngIf="!loading && friends.length === 0" class="empty-text">You haven't added any friends yet.</div>
    <table class="friends-table" *ngIf="friends.length > 0">
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Age</th>
          <th>City</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let friend of friends">
          <td>{{ friend.firstName }}</td>
          <td>{{ friend.lastName }}</td>
          <td>{{ friend.age }}</td>
          <td>{{ friend.city }}</td>
          <td>
            <button class="btn btn-primary btn-sm" (click)="viewCar(friend.clientId)">View Car</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="actions">
      <button class="btn btn-secondary" (click)="goBack()">Back to Profile</button>
    </div>
  </div>
</div>

<style>
  .page-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 3rem 1rem;
    background: #1a1a2e;
  }
  .card {
    background: #16213e;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    color: #eee;
  }
  .card-title { font-size: 1.75rem; margin-bottom: 0.5rem; }
  hr { border-color: #334; margin-bottom: 1.5rem; }
  .loading-text, .empty-text { color: #aaa; margin-bottom: 1.5rem; }
  .friends-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
  .friends-table th { text-align: left; color: #aaa; font-weight: 500; padding: 0.5rem 0.75rem; border-bottom: 1px solid #334; }
  .friends-table td { padding: 0.6rem 0.75rem; color: #eee; border-bottom: 1px solid #223; }
  .friends-table tr:hover td { background: #1e2d50; }
  .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
  .btn { padding: 0.45rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-secondary { background: #334; color: #eee; }
  .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.82rem; }
  .btn:hover { opacity: 0.85; }
</style>
