<div class="page-wrapper">
  <div class="card" *ngIf="garage; else loading">
    <h2 class="card-title">🚗 Your Garage</h2>
    <hr />
    <dl class="details-list">
      <div class="detail-row">
        <dt>Make</dt>
        <dd>{{ garage.car?.make ?? '—' }}</dd>
      </div>
      <div class="detail-row">
        <dt>Model</dt>
        <dd>{{ garage.car?.model ?? '—' }}</dd>
      </div>
      <div class="detail-row">
        <dt>Year</dt>
        <dd>{{ garage.car?.year ?? '—' }}</dd>
      </div>
      <div class="detail-row">
        <dt>Mileage</dt>
        <dd>{{ garage.car?.mileage ?? '—' }}</dd>
      </div>
    </dl>
    <div class="actions">
      <button class="btn btn-primary" (click)="navigateToEdit()">Edit Car</button>
      <button class="btn btn-danger" (click)="navigateToDelete()">Delete Car</button>
      <button class="btn btn-secondary" (click)="goBack()">Back to Profile</button>
    </div>
  </div>
  <ng-template #loading>
    <p class="loading-text">Loading your garage...</p>
  </ng-template>
</div>

<style>
  .page-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 3rem 1rem;
    background: #1a1a2e;
  }
  .card {
    background: #16213e;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    color: #eee;
  }
  .card-title {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
  }
  hr { border-color: #334; margin-bottom: 1.5rem; }
  .details-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .detail-row { display: flex; justify-content: space-between; }
  dt { color: #aaa; font-weight: 500; }
  dd { color: #fff; margin: 0; }
  .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-danger { background: #555; color: #fff; }
  .btn:hover { opacity: 0.85; }
  .loading-text { color: #aaa; text-align: center; margin-top: 4rem; font-size: 1rem; }
</style>
