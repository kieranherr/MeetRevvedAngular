<div class="page-wrapper">
  <div class="page-header">
    <h2>💬 Comments</h2>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="addComment()">Add Comment</button>
      <button class="btn btn-secondary" (click)="goBack()">← Back to Meet</button>
    </div>
  </div>

  <div *ngIf="loading" class="state-message">Loading comments...</div>
  <div *ngIf="error" class="state-message error">{{ error }}</div>

  <div *ngIf="!loading && !error" class="comments-container">
    <div *ngIf="comments.length === 0" class="empty-state">
      <h3>No Comments Yet</h3>
      <p>Be the first to say something!</p>
      <button class="btn btn-primary" (click)="addComment()">Add Comment</button>
    </div>

    <div *ngFor="let comment of comments" class="comment-card">
      <div class="comment-author">{{ comment.commentorsName }}</div>
      <div class="comment-body">{{ comment.commentBody }}</div>
      <div class="comment-date">{{ comment.date }}</div>
    </div>

    <div class="page-footer" *ngIf="comments.length > 0">
      <button class="btn btn-secondary" (click)="goBack()">← Back to Meet</button>
    </div>
  </div>
</div>

<style>
  .page-wrapper {
    min-height: 100vh;
    padding: 3rem 1.5rem;
    background: #1a1a2e;
    color: #eee;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 750px;
    margin: 0 auto 1.5rem;
  }
  .page-header h2 { font-size: 1.75rem; margin: 0; }
  .header-actions { display: flex; gap: 0.75rem; }
  .comments-container { max-width: 750px; margin: 0 auto; }
  .comment-card {
    background: #16213e;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    border-left: 4px solid #e94560;
  }
  .comment-author { font-weight: 700; color: #e94560; margin-bottom: 0.4rem; font-size: 0.95rem; }
  .comment-body { color: #ddd; font-size: 1rem; line-height: 1.5; margin-bottom: 0.5rem; }
  .comment-date { color: #666; font-size: 0.8rem; }
  .empty-state { text-align: center; padding: 3rem; color: #aaa; }
  .empty-state h3 { color: #fff; margin-bottom: 0.5rem; }
  .empty-state p { margin-bottom: 1.5rem; }
  .state-message { text-align: center; padding: 3rem; color: #aaa; }
  .state-message.error { color: #e94560; }
  .page-footer { margin-top: 1.5rem; }
  .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-secondary { background: #0f3460; color: #fff; }
  .btn:hover { opacity: 0.85; }
</style>
