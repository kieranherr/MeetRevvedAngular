<div class="page-wrapper">
  <div class="page-header">
    <h2>🏎 Meets Near You</h2>
    <button class="btn btn-accent" (click)="createMeet()">+ Create Meet</button>
  </div>

  <div class="zip-search">
    <input
      type="number"
      class="zip-input"
      placeholder="Search by zip code"
      [value]="zipInput"
      (input)="zipInput = $any($event.target).value"
      maxlength="5"
    />
    <button class="btn btn-secondary" (click)="searchByZip()">Search</button>
  </div>

  <div *ngIf="loading" class="state-message">Loading meets...</div>
  <div *ngIf="error" class="state-message error">{{ error }}</div>

  <div *ngIf="!loading && !error">
    <div *ngIf="meets.length === 0" class="empty-state">
      <p>No meets found in your area.</p>
      <button class="btn btn-primary" (click)="createMeet()">Create the First Meet!</button>
    </div>

    <table class="meet-table" *ngIf="meets.length > 0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Street</th>
          <th>City</th>
          <th>State</th>
          <th>Zip</th>
          <th>Time</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let meet of meets" (click)="goToDetails(meet.meetId)" class="meet-row">
          <td>{{ meet.meetName }}</td>
          <td>{{ meet.street }}</td>
          <td>{{ meet.city }}</td>
          <td>{{ meet.state }}</td>
          <td>{{ meet.zip }}</td>
          <td>{{ meet.meetTime }}</td>
          <td>{{ meet.meetDate }}</td>
        </tr>
      </tbody>
    </table>

    <div id="meet-map" class="map-container"></div>
  </div>
</div>

<style>
  .page-wrapper {
    min-height: 100vh;
    padding: 3rem 1.5rem;
    background: #1a1a2e;
    color: #eee;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1000px;
    margin: 0 auto 1.5rem;
  }
  .page-header h2 { font-size: 1.75rem; margin: 0; }
  .zip-search {
    display: flex;
    gap: 0.75rem;
    max-width: 1000px;
    margin: 0 auto 1.5rem;
  }
  .zip-input {
    flex: 1;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid #333;
    background: #16213e;
    color: #eee;
    font-size: 0.95rem;
  }
  .meet-table {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto 2rem;
    border-collapse: collapse;
    background: #16213e;
    border-radius: 12px;
    overflow: hidden;
  }
  .meet-table th {
    background: #0f3460;
    color: #eee;
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.9rem;
  }
  .meet-table td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #1a1a2e;
    color: #ccc;
    font-size: 0.9rem;
  }
  .meet-row { cursor: pointer; transition: background 0.15s; }
  .meet-row:hover td { background: #0f3460; color: #fff; }
  .map-container {
    max-width: 1000px;
    margin: 0 auto;
    height: 400px;
    border-radius: 12px;
    overflow: hidden;
  }
  .state-message { text-align: center; padding: 3rem; color: #aaa; }
  .state-message.error { color: #e94560; }
  .empty-state { text-align: center; padding: 3rem; color: #aaa; }
  .empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }
  .btn { padding: 0.5rem 1.25rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-secondary { background: #0f3460; color: #fff; }
  .btn-accent { background: #e94560; color: #fff; }
  .btn:hover { opacity: 0.85; }
</style>
